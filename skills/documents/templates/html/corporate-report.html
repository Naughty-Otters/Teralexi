<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{{title}}</title>
  <style>
    @page { size: A4; margin: 22mm 18mm 26mm; }
    body {
      font-family: "Segoe UI", Calibri, Arial, sans-serif;
      font-size: 11pt;
      line-height: 1.55;
      color: #1a1a1a;
      margin: 0;
    }
    .report-header {
      border-bottom: 3px solid #2E75B6;
      padding-bottom: 12px;
      margin-bottom: 24px;
    }
    .report-header h1 {
      margin: 0 0 6px;
      font-size: 22pt;
      color: #1F397B;
    }
    .report-meta {
      font-size: 10pt;
      color: #555;
    }
    section { margin-bottom: 20px; }
    section h2 {
      font-size: 14pt;
      color: #2E75B6;
      margin: 0 0 8px;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 4px;
    }
    section p { margin: 0; text-align: justify; }
    table.data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 10pt;
    }
    table.data-table th {
      background: #2E75B6;
      color: #fff;
      padding: 8px 10px;
      text-align: left;
    }
    table.data-table td {
      padding: 6px 10px;
      border-bottom: 1px solid #e8e8e8;
    }
    table.data-table tr:nth-child(even) td { background: #F5F8FD; }
  </style>
</head>
<body>
  <header class="report-header">
    <h1>{{title}}</h1>
    <p class="report-meta">
      {{#meta.author}}{{meta.author}}{{/meta.author}}
      {{#meta.date}} · {{meta.date}}{{/meta.date}}
    </p>
  </header>
  {{#sections}}
  <section>
    <h2>{{heading}}</h2>
    <p>{{body}}</p>
  </section>
  {{/sections}}
  {{#table}}
  <table class="data-table">
    <thead>
      <tr>{{#headers}}<th>{{.}}</th>{{/headers}}</tr>
    </thead>
    <tbody>
      {{#rows}}
      <tr>{{#.}}<td>{{.}}</td>{{/.}}</tr>
      {{/rows}}
    </tbody>
  </table>
  {{/table}}
</body>
</html>
