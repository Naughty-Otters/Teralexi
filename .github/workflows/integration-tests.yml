name: Integration tests

on:
  # Nightly at 08:00 UTC (~01:00 America/Los_Angeles).
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-integration:
    name: UI integration (renderer + IPC)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run UI integration tests
        run: npm run test:integration:ui
