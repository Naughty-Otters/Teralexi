name: Integration tests

on:
  # Nightly at 08:00 UTC (~01:00 America/Los_Angeles).
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-integration:
    name: UI integration (renderer + IPC)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install platform-native optional deps
        run: npm install --include=optional @rolldown/binding-linux-x64-gnu @rolldown/binding-win32-x64-msvc @rolldown/binding-darwin-arm64 @rolldown/binding-darwin-x64 sharp lightningcss @tailwindcss/oxide

      - name: Run UI integration tests
        run: npm run test:integration:ui
