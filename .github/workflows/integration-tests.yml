name: Integration tests

on:
  # Nightly at 08:00 UTC (~01:00 America/Los_Angeles).
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-integration:
    name: UI integration (renderer + IPC)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run UI integration tests
        run: npm run test:integration:ui

  e2e-smoke:
    name: Electron smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: ui-integration

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Lockfile may omit Linux native optional binaries (sharp, lightningcss, oxide).
      - name: Install Linux native optional deps
        run: npm install --include=optional sharp lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu

      - name: Build unpacked sit app
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          TERALEXI_BUILD_ENV: sit
          TERALEXI_FORCE_UNSIGNED: '1'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build:dir:sit

      - name: Run Electron smoke tests
        env:
          TERALEXI_TEST_MODE: '1'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 7
