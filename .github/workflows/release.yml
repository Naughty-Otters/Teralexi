name: Release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "release" to build and publish a production release'
        required: true
      platform:
        description: 'Platforms to build and publish'
        type: choice
        required: true
        default: all
        options:
          - all
          - mac
          - win

permissions:
  contents: read
  # Required for GitHub OIDC → AWS role assumption (no long-lived keys).
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job-level `if` cannot reference `matrix` — build the include list here instead.
  select-platforms:
    name: Select platforms
    if: inputs.confirm == 'release'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
    steps:
      - id: select
        shell: bash
        run: |
          case "${{ inputs.platform }}" in
            mac)
              matrix='{"include":[{"os":"macos-latest","platform":"mac","npm_script":"release:mac"}]}'
              ;;
            win)
              matrix='{"include":[{"os":"windows-latest","platform":"win","npm_script":"release:win"}]}'
              ;;
            *)
              matrix='{"include":[{"os":"macos-latest","platform":"mac","npm_script":"release:mac"},{"os":"windows-latest","platform":"win","npm_script":"release:win"}]}'
              ;;
          esac
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  release:
    name: Production release (${{ matrix.platform }})
    needs: select-platforms
    runs-on: ${{ matrix.os }}
    # Signing / notarization / AWS secrets live in the "release" environment.
    environment: release
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.select-platforms.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Verify release version
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/verify-release-version.mjs

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install platform-native optional deps
        run: npm install --include=optional sharp lightningcss @tailwindcss/oxide

      - name: Run unit tests
        run: npm run test:unit

      - name: Build production installers (env/.prod.env)
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          TERALEXI_BUILD_ENV: prod
          MAC_SIGN_CERTIFICATE: ${{ matrix.platform == 'mac' && secrets.MAC_SIGN_CERTIFICATE_BASE64 || '' }}
          MAC_SIGN_CERTIFICATE_PASSWORD: ${{ matrix.platform == 'mac' && secrets.MAC_SIGN_CERTIFICATE_PASSWORD || '' }}
          MAC_SIGN_IDENTITY: ${{ matrix.platform == 'mac' && secrets.MAC_SIGN_IDENTITY || '' }}
          MAC_APPLE_ID: ${{ matrix.platform == 'mac' && secrets.MAC_APPLE_ID || '' }}
          MAC_APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.MAC_APPLE_APP_SPECIFIC_PASSWORD || '' }}
          MAC_APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.MAC_APPLE_TEAM_ID || '' }}
          WIN_SIGN_CERTIFICATE: ${{ matrix.platform == 'win' && secrets.WIN_SIGN_CERTIFICATE_BASE64 || '' }}
          WIN_SIGN_CERTIFICATE_PASSWORD: ${{ matrix.platform == 'win' && secrets.WIN_SIGN_CERTIFICATE_PASSWORD || '' }}
          AZURE_TENANT_ID: ${{ matrix.platform == 'win' && secrets.AZURE_TENANT_ID || '' }}
          AZURE_CLIENT_ID: ${{ matrix.platform == 'win' && secrets.AZURE_CLIENT_ID || '' }}
          AZURE_CLIENT_SECRET: ${{ matrix.platform == 'win' && secrets.AZURE_CLIENT_SECRET || '' }}
          AZURE_SIGNING_ENDPOINT: ${{ matrix.platform == 'win' && secrets.AZURE_SIGNING_ENDPOINT || '' }}
          AZURE_SIGNING_ACCOUNT_NAME: ${{ matrix.platform == 'win' && secrets.AZURE_SIGNING_ACCOUNT_NAME || '' }}
          AZURE_SIGNING_CERTIFICATE_PROFILE: ${{ matrix.platform == 'win' && secrets.AZURE_SIGNING_CERTIFICATE_PROFILE || '' }}
          AZURE_SIGNING_PUBLISHER_NAME: ${{ matrix.platform == 'win' && secrets.AZURE_SIGNING_PUBLISHER_NAME || '' }}
        run: npm run ${{ matrix.npm_script }}

      - name: Verify signed artifacts
        run: npm run verify:signing

      - name: Verify macOS update manifest covers both CPU types
        if: matrix.platform == 'mac'
        run: node .github/scripts/verify-mac-update-manifest.mjs build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: teralexi-release-${{ matrix.platform }}-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload production release to S3
        env:
          S3_RELEASE_BUCKET: ${{ secrets.S3_RELEASE_BUCKET }}
          S3_RELEASE_PREFIX: desktop/releases/stable
        run: npm run release:upload-s3

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: teralexi-${{ matrix.platform }}-prod
          path: |
            build/*.yml
            build/latest*.yml
            build/*.blockmap
          retention-days: 7
          if-no-files-found: ignore
