name: Release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "release" to build and publish a production release'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Production release (${{ matrix.os }})
    if: inputs.confirm == 'release'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            npm_script: release:mac
          - os: windows-latest
            npm_script: release:win

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify release version
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/verify-release-version.mjs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Build and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=6144
          OPENFDE_BUILD_ENV: prod
        run: npm run ${{ matrix.npm_script }}

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openfde-${{ matrix.os }}-prod
          path: |
            build/*.dmg
            build/*.zip
            build/*.exe
            build/*.yml
            build/latest*.yml
          retention-days: 30
          if-no-files-found: ignore
