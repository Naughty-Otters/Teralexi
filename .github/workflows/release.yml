name: Release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "release" to build and publish a production release'
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Production release (${{ matrix.platform }})
    if: inputs.confirm == 'release'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            npm_script: release:mac
            mac_sign_certificate: ${{ secrets.MAC_SIGN_CERTIFICATE_BASE64 }}
            mac_sign_certificate_password: ${{ secrets.MAC_SIGN_CERTIFICATE_PASSWORD }}
            mac_sign_identity: ${{ secrets.MAC_SIGN_IDENTITY }}
            mac_apple_id: ${{ secrets.APPLE_ID }}
            mac_apple_app_specific_password: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
            mac_apple_team_id: ${{ secrets.APPLE_TEAM_ID }}
            win_sign_certificate: ''
            win_sign_certificate_password: ''
          - os: windows-latest
            platform: win
            npm_script: release:win
            mac_sign_certificate: ''
            mac_sign_certificate_password: ''
            mac_sign_identity: ''
            mac_apple_id: ''
            mac_apple_app_specific_password: ''
            mac_apple_team_id: ''
            win_sign_certificate: ${{ secrets.WIN_SIGN_CERTIFICATE_BASE64 }}
            win_sign_certificate_password: ${{ secrets.WIN_SIGN_CERTIFICATE_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify release version
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/verify-release-version.mjs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Build production installers (env/.prod.env)
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          OPENFDE_BUILD_ENV: prod
          MAC_SIGN_CERTIFICATE: ${{ matrix.mac_sign_certificate }}
          MAC_SIGN_CERTIFICATE_PASSWORD: ${{ matrix.mac_sign_certificate_password }}
          MAC_SIGN_IDENTITY: ${{ matrix.mac_sign_identity }}
          MAC_APPLE_ID: ${{ matrix.mac_apple_id }}
          MAC_APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.mac_apple_app_specific_password }}
          MAC_APPLE_TEAM_ID: ${{ matrix.mac_apple_team_id }}
          WIN_SIGN_CERTIFICATE: ${{ matrix.win_sign_certificate }}
          WIN_SIGN_CERTIFICATE_PASSWORD: ${{ matrix.win_sign_certificate_password }}
        run: npm run ${{ matrix.npm_script }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload production release to S3
        env:
          S3_RELEASE_BUCKET: ${{ secrets.S3_RELEASE_BUCKET }}
          S3_RELEASE_PREFIX: desktop/releases/stable
        run: npm run release:upload-s3

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openfde-${{ matrix.platform }}-prod
          path: |
            build/*.dmg
            build/*.zip
            build/*.exe
            build/*.yml
            build/latest*.yml
            build/*.blockmap
          retention-days: 30
          if-no-files-found: ignore
