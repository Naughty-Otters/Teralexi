name: CI

on:
  push:
    branches: [main, master]
    tags-ignore: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck ratchet (advisory floor)
        run: npm run typecheck:ratchet

      - name: Run unit tests
        run: npm run test:unit

  build:
    name: Staging build (${{ matrix.platform }})
    # needs: unit-tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            npm_script: build:mac:sit
            artifact_path: |
              build/*.dmg
              build/*.blockmap
              build/*.yml
              build/latest*.yml
          - os: windows-latest
            platform: win
            npm_script: build:win64:sit
            artifact_path: |
              build/*.exe
              build/*.blockmap
              build/*.yml
              build/latest*.yml

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Lockfile may omit platform-specific native binaries (sharp, lightningcss, oxide).
      - name: Install platform-native optional deps
        run: npm install --include=optional sharp lightningcss @tailwindcss/oxide

      - name: Build desktop app (staging / env/.sit.env, unsigned)
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          TERALEXI_BUILD_ENV: sit
          # CI staging artifacts are unsigned; release.yml handles signing.
          TERALEXI_FORCE_UNSIGNED: '1'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run ${{ matrix.npm_script }}

      - name: Upload desktop build (internal)
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: teralexi-${{ matrix.platform }}-sit-${{ github.run_number }}-${{ github.sha }}
          path: ${{ matrix.artifact_path }}
          retention-days: 14
          if-no-files-found: error

  update-readme:
    name: Update README
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Update README CI status
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: node .github/scripts/update-readme-ci-status.mjs

      - name: Commit and push README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "README.md already up to date."
            exit 0
          fi
          git commit -m "docs: update README CI build status [skip ci]"
          git push
