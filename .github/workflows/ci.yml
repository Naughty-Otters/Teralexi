name: CI

on:
  push:
    branches: [main, master]
    tags-ignore: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload coverage summary
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          retention-days: 7
          if-no-files-found: error

  build:
    name: Staging build (${{ matrix.platform }})
    # needs: unit-tests
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            npm_script: build:mac:sit
            artifact_path: |
              build/*.dmg
              build/*.blockmap
              build/*.yml
              build/latest*.yml
          - os: windows-latest
            platform: win
            npm_script: build:win64:sit
            artifact_path: |
              build/*.exe
              build/*.blockmap
              build/*.yml
              build/latest*.yml

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Lockfile may omit platform-specific native binaries (sharp, lightningcss, oxide).
      - name: Install platform-native optional deps
        run: npm install --include=optional sharp lightningcss @tailwindcss/oxide

      - name: Build desktop app (staging / env/.sit.env, unsigned)
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          TERALEXI_BUILD_ENV: sit
          # CI staging artifacts are unsigned; release.yml handles signing.
          TERALEXI_FORCE_UNSIGNED: '1'
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run ${{ matrix.npm_script }}

      - name: Upload desktop build (internal)
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: teralexi-${{ matrix.platform }}-sit-${{ github.run_number }}-${{ github.sha }}
          path: ${{ matrix.artifact_path }}
          retention-days: 14
          if-no-files-found: error

  update-readme:
    name: Update README
    needs: [unit-tests, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # App token from this environment can push to protected main.
    environment: CI-build
    permissions:
      contents: read

    steps:
      # Secrets often store the .pem as one line with "\n", or as base64.
      - name: Normalize GitHub App private key
        id: app-key
        env:
          RAW_KEY: ${{ secrets.GIT_CI_BUILD_BOT_APP_PRIVATE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${RAW_KEY}" ]; then
            echo "::error::CI-build secret GIT_CI_BUILD_BOT_APP_PRIVATE_ID is empty."
            echo "::error::Paste the full GitHub App private key .pem (including BEGIN/END lines)."
            exit 1
          fi

          key="$RAW_KEY"
          if [[ "$key" == \"*\" && "$key" == *\" ]]; then
            key="${key:1:-1}"
          fi
          key="${key//\\n/$'\n'}"
          key="${key//$'\r'/}"

          if ! printf '%s' "$key" | grep -q 'BEGIN.*PRIVATE KEY'; then
            decoded="$(printf '%s' "$key" | base64 -d 2>/dev/null || true)"
            if printf '%s' "$decoded" | grep -q 'BEGIN.*PRIVATE KEY'; then
              key="$decoded"
              key="${key//$'\r'/}"
            fi
          fi

          if ! printf '%s' "$key" | grep -q 'BEGIN.*PRIVATE KEY'; then
            echo "::error::GIT_CI_BUILD_BOT_APP_PRIVATE_ID is not a PEM private key."
            echo "::error::Use the .pem from GitHub App → Generate a private key."
            exit 1
          fi

          {
            echo "private-key<<PRIVATE_KEY_EOF"
            printf '%s\n' "$key"
            echo "PRIVATE_KEY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GIT_CI_BUILD_BOT_APP_ID }}
          private-key: ${{ steps.app-key.outputs.private-key }}
          # Inherit all permissions granted on the installation (explicit
          # permission-* inputs can produce tokens that fail protected-branch push).

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Verify app token can push
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INSTALLATION_ID: ${{ steps.app-token.outputs.installation-id }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          echo "Installation id: ${INSTALLATION_ID}"
          echo "App slug: ${APP_SLUG}"
          echo "Target repository: ${GITHUB_REPOSITORY}"

          echo ""
          echo "Repositories accessible to this installation token:"
          installation_json="$(gh api "/installation/repositories?per_page=100" --paginate)"
          repo_count="$(printf '%s' "${installation_json}" | jq '[.[].repositories[]] | length')"
          if [ "${repo_count}" -eq 0 ]; then
            echo "  (none — the app installation has no repository access)"
          else
            printf '%s' "${installation_json}" | jq -r '.[].repositories[] | "  - \(.full_name)  pull=\(.permissions.pull) push=\(.permissions.push)"'
          fi

          target_repo="$(printf '%s' "${installation_json}" | jq --arg repo "${GITHUB_REPOSITORY}" '[.[].repositories[] | select(.full_name == $repo)] | first')"
          if [ -z "${target_repo}" ] || [ "${target_repo}" = "null" ]; then
            echo ""
            echo "::error::${APP_SLUG} is not installed on ${GITHUB_REPOSITORY}."
            echo "::error::Org → Settings → GitHub Apps → ${APP_SLUG} → Configure → Repository access → add ${GITHUB_REPOSITORY##*/} (or All repositories)."
            exit 1
          fi

          install_push="$(printf '%s' "${target_repo}" | jq -r '.permissions.push')"
          echo ""
          echo "Installation listing permissions.push for ${GITHUB_REPOSITORY}: ${install_push}"
          echo "(GET /repos/.../permissions is often all-false for app tokens and is not used here.)"

          echo ""
          echo "Dry-run push to ${GITHUB_REF_NAME}..."
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          if git push --dry-run "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"; then
            echo "Push access verified."
            exit 0
          fi

          echo ""
          echo "::error::${APP_SLUG} cannot push to ${GITHUB_REPOSITORY} (git push --dry-run failed)."
          if [ "${install_push}" != "true" ]; then
            echo "::error::Installation still reports push=false. Fix app permissions, then accept on the org installation."
          fi
          echo "::error::1) App → Permissions → Contents → Read and write → Save"
          echo "::error::2) Org installation → Review and accept new permissions"
          echo "::error::3) main branch protection → add ${APP_SLUG}[bot] to bypass / allowed push actors"
          echo "::error::4) If org uses SAML SSO → https://github.com/settings/applications → Authorize for Naughty-Otters"
          exit 1

      - name: Download coverage summary
        uses: actions/download-artifact@v5
        with:
          name: coverage-summary
          path: coverage

      - name: Write coverage badge
        run: node .github/scripts/write-coverage-badge.mjs

      - name: Update README CI status
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: node .github/scripts/update-readme-ci-status.mjs

      - name: Commit and push README
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git add README.md .github/badges/coverage.json
          if git diff --staged --quiet; then
            echo "README.md and coverage badge already up to date."
            exit 0
          fi
          git commit -m "docs: update README CI status and coverage badge [skip ci]"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}"
