name: Cleanup

on:
  schedule:
    # Daily at 00:00 and 12:00 UTC.
    - cron: '0 0,12 * * *'
  workflow_run:
    workflows: [CI, Release]
    types: [completed]
  workflow_dispatch:
    inputs:
      artifact_retention_days:
        description: Delete artifacts older than this many days (0 = delete all)
        required: false
        default: '3'
      cache_retention_days:
        description: Delete caches not accessed in this many days (0 = delete all)
        required: false
        default: '3'
      purge_all_artifacts:
        description: Emergency — delete every artifact regardless of age
        required: false
        type: boolean
        default: false
      purge_all_caches:
        description: Emergency — delete every cache regardless of age
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  contents: read

concurrency:
  group: cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    name: Cleanup artifacts and caches
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ARTIFACT_RETENTION_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.artifact_retention_days || '3' }}
      CACHE_RETENTION_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.cache_retention_days || '3' }}
      PURGE_ALL_ARTIFACTS: ${{ github.event_name == 'workflow_dispatch' && inputs.purge_all_artifacts || 'false' }}
      PURGE_ALL_CACHES: ${{ github.event_name == 'workflow_dispatch' && inputs.purge_all_caches || 'false' }}

    steps:
      - name: Delete old workflow artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const purgeAll = process.env.PURGE_ALL_ARTIFACTS === 'true'
            const retentionDays = Number(process.env.ARTIFACT_RETENTION_DAYS)
            const cutoff =
              retentionDays <= 0 || purgeAll
                ? Number.POSITIVE_INFINITY
                : Date.now() - retentionDays * 24 * 60 * 60 * 1000

            const artifacts = []
            let page = 1

            while (true) {
              const { data } = await github.rest.actions.listArtifactsForRepo({
                owner,
                repo,
                per_page: 100,
                page,
              })

              artifacts.push(...data.artifacts)
              if (data.artifacts.length < 100) break
              page += 1
            }

            let deleted = 0
            let skipped = 0
            let freedBytes = 0

            for (const artifact of artifacts) {
              const createdAt = new Date(artifact.created_at).getTime()
              if (!purgeAll && retentionDays > 0 && createdAt >= cutoff) {
                skipped += 1
                continue
              }

              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              })
              deleted += 1
              freedBytes += artifact.size_in_bytes ?? 0
              core.info(
                `Deleted artifact ${artifact.id} (${artifact.name}, ${artifact.size_in_bytes ?? 0} bytes)`,
              )
            }

            const freedMb = (freedBytes / (1024 * 1024)).toFixed(1)
            core.summary.addHeading('Artifact cleanup')
            core.summary.addRaw(
              purgeAll || retentionDays <= 0
                ? `Deleted **${deleted}** artifact(s) (~${freedMb} MB).`
                : `Deleted **${deleted}** artifact(s) (~${freedMb} MB); kept **${skipped}** newer than ${retentionDays} day(s).`,
            )
            core.summary.addRaw(
              '\n\nQuota usage is recalculated every 6–12 hours after deletions.',
            )
            await core.summary.write()

      - name: Delete stale workflow caches
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const purgeAll = process.env.PURGE_ALL_CACHES === 'true'
            const retentionDays = Number(process.env.CACHE_RETENTION_DAYS)
            const cutoff =
              retentionDays <= 0 || purgeAll
                ? Number.POSITIVE_INFINITY
                : Date.now() - retentionDays * 24 * 60 * 60 * 1000

            const caches = []
            let page = 1

            while (true) {
              const { data } = await github.rest.actions.getActionsCacheList({
                owner,
                repo,
                per_page: 100,
                page,
              })

              const batch = data.actions_caches ?? []
              caches.push(...batch)
              if (batch.length < 100) break
              page += 1
            }

            let deleted = 0
            let skipped = 0
            let freedBytes = 0

            for (const cache of caches) {
              const lastAccessed = new Date(cache.last_accessed_at).getTime()
              if (!purgeAll && retentionDays > 0 && lastAccessed >= cutoff) {
                skipped += 1
                continue
              }

              await github.rest.actions.deleteActionsCacheById({
                owner,
                repo,
                cache_id: cache.id,
              })
              deleted += 1
              freedBytes += cache.size_in_bytes ?? 0
              core.info(`Deleted cache ${cache.id} (${cache.key})`)
            }

            const freedMb = (freedBytes / (1024 * 1024)).toFixed(1)
            core.summary.addHeading('Cache cleanup')
            core.summary.addRaw(
              purgeAll || retentionDays <= 0
                ? `Deleted **${deleted}** cache(s) (~${freedMb} MB).`
                : `Deleted **${deleted}** cache(s) (~${freedMb} MB); kept **${skipped}** accessed within ${retentionDays} day(s).`,
            )
            await core.summary.write()
