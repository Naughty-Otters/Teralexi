<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Teralexi</title>
    <style>
      :root {
        --splash-bg: #fafafa;
        --splash-text: #52525b;
        --splash-text-dim: #a1a1aa;
        --splash-accent: #2563eb;
        --splash-spinner-track: #e4e4e7;
        --splash-spinner-head: #2563eb;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --splash-bg: #18181b;
          --splash-text: #a1a1aa;
          --splash-text-dim: #52525b;
          --splash-accent: #60a5fa;
          --splash-spinner-track: #3f3f46;
          --splash-spinner-head: #60a5fa;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        user-select: none;
        -webkit-app-region: no-drag;
        -webkit-font-smoothing: antialiased;
        background: var(--splash-bg);
      }

      body {
        display: grid;
        place-items: center;
        font:
          12px/1.35 system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        color: var(--splash-text);
      }

      .splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding: 8px;
        animation: splash-in 0.28s ease-out both;
      }

      .splash-mark {
        position: relative;
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
      }

      .splash-logo {
        width: 40px;
        height: 40px;
        display: block;
        object-fit: contain;
      }

      .splash-logo--light {
        display: none;
        filter: brightness(0) saturate(100%);
        opacity: 0.88;
      }

      .splash-logo--dark {
        display: none;
        mix-blend-mode: screen;
      }

      @media (prefers-color-scheme: light) {
        .splash-logo--light {
          display: block;
        }
      }

      @media (prefers-color-scheme: dark) {
        .splash-logo--dark {
          display: block;
        }
      }

      .splash-spinner {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid var(--splash-spinner-track);
        border-top-color: var(--splash-spinner-head);
        animation: spin 0.8s linear infinite;
      }

      .splash-label {
        margin: 0;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .splash-label__word {
        display: inline-flex;
        align-items: baseline;
        gap: 0.02em;
        animation: word-breathe 2.8s ease-in-out infinite;
      }

      .breath-char {
        display: inline-block;
        color: var(--splash-text-dim);
        transform-origin: center bottom;
        animation: char-breathe 2.8s ease-in-out infinite;
        will-change: transform, opacity, color, text-shadow;
      }

      .breath-char:nth-child(1) {
        animation-delay: 0s;
      }
      .breath-char:nth-child(2) {
        animation-delay: 0.12s;
      }
      .breath-char:nth-child(3) {
        animation-delay: 0.24s;
      }
      .breath-char:nth-child(4) {
        animation-delay: 0.36s;
      }
      .breath-char:nth-child(5) {
        animation-delay: 0.48s;
      }
      .breath-char:nth-child(6) {
        animation-delay: 0.6s;
      }
      .breath-char:nth-child(7) {
        animation-delay: 0.72s;
      }

      .breath-dot {
        display: inline-block;
        width: 0.28em;
        text-align: center;
        color: var(--splash-accent);
        opacity: 0;
        transform: scale(0.4);
        animation: dot-breathe 2.8s ease-in-out infinite;
      }

      .breath-dot:nth-child(8) {
        animation-delay: 0.84s;
      }
      .breath-dot:nth-child(9) {
        animation-delay: 0.96s;
      }
      .breath-dot:nth-child(10) {
        animation-delay: 1.08s;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes splash-in {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes word-breathe {
        0%,
        100% {
          letter-spacing: 0.04em;
          transform: scaleX(0.98);
        }
        50% {
          letter-spacing: 0.14em;
          transform: scaleX(1.02);
        }
      }

      @keyframes char-breathe {
        0%,
        100% {
          opacity: 0.35;
          color: var(--splash-text-dim);
          transform: translateY(2px) scale(0.9);
          text-shadow: none;
        }
        45%,
        55% {
          opacity: 1;
          color: var(--splash-text);
          transform: translateY(-3px) scale(1.12);
          text-shadow: 0 0 12px color-mix(in srgb, var(--splash-accent) 35%, transparent);
        }
      }

      @keyframes dot-breathe {
        0%,
        35%,
        100% {
          opacity: 0;
          transform: scale(0.4) translateY(2px);
        }
        55% {
          opacity: 0.9;
          transform: scale(1) translateY(-2px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .splash {
          animation: none;
        }

        .splash-spinner {
          animation-duration: 1.2s;
        }

        .splash-label__word,
        .breath-char,
        .breath-dot {
          animation: none;
        }

        .breath-char {
          opacity: 0.85;
          color: var(--splash-text);
          transform: none;
        }

        .breath-dot {
          opacity: 0.5;
          transform: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="splash" role="status" aria-live="polite" aria-busy="true">
      <div class="splash-mark">
        <img
          class="splash-logo splash-logo--light"
          src="./teralexi-logo-splash.png"
          width="40"
          height="40"
          alt=""
          decoding="async"
        />
        <img
          class="splash-logo splash-logo--dark"
          src="./teralexi-logo-dark.png"
          width="40"
          height="40"
          alt=""
          decoding="async"
        />
        <div class="splash-spinner" aria-hidden="true"></div>
      </div>
      <p class="splash-label" aria-label="Loading">
        <span class="splash-label__word" aria-hidden="true">
          <span class="breath-char">L</span>
          <span class="breath-char">O</span>
          <span class="breath-char">A</span>
          <span class="breath-char">D</span>
          <span class="breath-char">I</span>
          <span class="breath-char">N</span>
          <span class="breath-char">G</span>
          <span class="breath-dot">.</span>
          <span class="breath-dot">.</span>
          <span class="breath-dot">.</span>
        </span>
      </p>
    </div>
  </body>
</html>
