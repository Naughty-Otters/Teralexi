<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Teralexi</title>
    <style>
      :root {
        --splash-bg: #fafafa;
        --splash-text: #52525b;
        --splash-spinner-track: #e4e4e7;
        --splash-spinner-head: #2563eb;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --splash-bg: #18181b;
          --splash-text: #a1a1aa;
          --splash-spinner-track: #3f3f46;
          --splash-spinner-head: #60a5fa;
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        user-select: none;
        -webkit-app-region: no-drag;
        -webkit-font-smoothing: antialiased;
        background: var(--splash-bg);
      }

      body {
        display: grid;
        place-items: center;
        font:
          12px/1.35 system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        color: var(--splash-text);
      }

      .splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        padding: 8px;
        animation: splash-in 0.28s ease-out both;
      }

      .splash-mark {
        position: relative;
        width: 56px;
        height: 56px;
        display: grid;
        place-items: center;
      }

      .splash-logo {
        width: 40px;
        height: 40px;
        display: block;
        object-fit: contain;
      }

      .splash-logo--light {
        display: none;
        filter: brightness(0) saturate(100%);
        opacity: 0.88;
      }

      .splash-logo--dark {
        display: none;
        mix-blend-mode: screen;
      }

      @media (prefers-color-scheme: light) {
        .splash-logo--light {
          display: block;
        }
      }

      @media (prefers-color-scheme: dark) {
        .splash-logo--dark {
          display: block;
        }
      }

      .splash-spinner {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid var(--splash-spinner-track);
        border-top-color: var(--splash-spinner-head);
        animation: spin 0.8s linear infinite;
      }

      .splash-label {
        margin: 0;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes splash-in {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .splash {
          animation: none;
        }

        .splash-spinner {
          animation-duration: 1.2s;
        }
      }
    </style>
  </head>

  <body>
    <div class="splash" role="status" aria-live="polite" aria-busy="true">
      <div class="splash-mark">
        <img
          class="splash-logo splash-logo--light"
          src="./teralexi-logo-splash.png"
          width="40"
          height="40"
          alt=""
          decoding="async"
        />
        <img
          class="splash-logo splash-logo--dark"
          src="./teralexi-logo-dark.png"
          width="40"
          height="40"
          alt=""
          decoding="async"
        />
        <div class="splash-spinner" aria-hidden="true"></div>
      </div>
      <p class="splash-label">Loading</p>
    </div>
  </body>
</html>
